<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Mono:wght@500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy-0: #060c20;
    --navy-1: #0c1730;
    --navy-2: #16264a;
  }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background:
      radial-gradient(120% 90% at 50% 0%, #16264a 0%, #0c1730 48%, #060c20 100%);
    color: #eaf0fb;
    min-height: 100vh;
    padding: 64px 28px 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* faint starfield / grid wash */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 18% 28%, rgba(120,170,255,.10), transparent 38%),
      radial-gradient(circle at 82% 64%, rgba(150,110,255,.10), transparent 40%);
    pointer-events: none;
  }

  .head-block { text-align: center; max-width: 720px; margin: 0 auto 56px; position: relative; }
  .kicker {
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: .34em;
    text-transform: uppercase; color: #6f8bc7; margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(30px, 5vw, 54px); font-weight: 700; letter-spacing: -.02em; line-height: 1.04;
  }
  h1 .grad {
    background: linear-gradient(92deg, #5fc8ff, #8b8bff 55%, #c98bff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { margin-top: 16px; color: #9fb0d4; font-size: 16px; line-height: 1.6; }

  .row {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: clamp(14px, 3vw, 40px);
    max-width: 1240px; margin: 0 auto;
  }

  .char { width: 210px; display: flex; flex-direction: column; align-items: center; }

  .scene {
    position: relative; width: 210px; height: 280px;
    display: flex; align-items: center; justify-content: center;
  }

  /* per-character colored halo */
  .scene::before {
    content: ''; position: absolute; left: 50%; top: 46%;
    width: 74%; height: 60%; transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow) 0%, transparent 68%);
    filter: blur(10px); opacity: .9;
    animation: halo 4.4s ease-in-out infinite;
  }
  @keyframes halo { 0%,100% { opacity:.65; transform: translate(-50%,-50%) scale(.92);} 50% { opacity:1; transform: translate(-50%,-50%) scale(1.06);} }

  /* ground shadow */
  .scene::after {
    content: ''; position: absolute; left: 50%; bottom: 28px;
    width: var(--shadow-w, 46%); height: 16px; transform: translateX(-50%);
    background: radial-gradient(circle, rgba(0,0,0,.6), transparent 70%);
    filter: blur(4px);
    animation: shadowBob 3.6s ease-in-out infinite;
    animation-delay: var(--bob-delay, 0s);
  }
  @keyframes shadowBob { 0%,100% { opacity:.5; transform: translateX(-50%) scale(.92);} 50% { opacity:.74; transform: translateX(-50%) scale(1.06);} }

  /* ───────── the robot ───────── */
  .bot {
    position: relative; width: 130px;
    animation: bob 3.6s ease-in-out infinite;
    animation-delay: var(--bob-delay, 0s);
    will-change: transform;
  }
  @keyframes bob { 0%,100% { transform: translateY(4px);} 50% { transform: translateY(-8px);} }

  /* head */
  .head {
    position: relative; width: 100%; margin: 0 auto;
    aspect-ratio: var(--head-ar, 1.12);
    border-radius: var(--head-r, 44% / 50%);
    background: radial-gradient(circle at 36% 24%, var(--b1,#ffffff), var(--b2,#eef2f8) 50%, var(--b3,#c6cfde));
    box-shadow:
      inset -6px -8px 14px rgba(120,135,165,.5),
      inset 6px 6px 12px rgba(255,255,255,.92),
      0 9px 18px rgba(0,0,0,.42);
    z-index: 3;
  }

  /* hoodie ridge (Hacker) */
  .hoodie {
    position: absolute; left: 50%; top: -8%; width: 116%; height: 78%;
    transform: translateX(-50%);
    border-radius: 50% 50% 46% 46% / 60% 60% 40% 40%;
    background: linear-gradient(180deg, #14361f, #0b2415 70%, #08200f);
    box-shadow: inset 0 -6px 10px rgba(0,0,0,.5), 0 4px 10px rgba(0,0,0,.4);
    z-index: 2;
  }

  /* antenna */
  .antenna { position: absolute; left: 50%; top: -22%; transform: translateX(-50%); z-index: 1; }
  .antenna .rod { width: 3px; height: 18px; margin: 0 auto;
    background: linear-gradient(#cfd6e2, #8a94a6); border-radius: 2px; }
  .antenna .ball { width: 11px; height: 11px; border-radius: 50%; margin: -2px auto 0;
    background: radial-gradient(circle at 36% 30%, #fff, var(--accent) 60%, var(--accent2, var(--accent)));
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    animation: blip 1.8s ease-in-out infinite; }
  @keyframes blip { 0%,100% { opacity:.7; transform: scale(.9);} 50% { opacity:1; transform: scale(1.12);} }
  .antenna svg { display: block; filter: drop-shadow(0 0 5px var(--accent)); animation: spin 6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg);} }

  /* visor / face */
  .visor {
    position: absolute; left: 50%; top: 50%; width: 74%; height: 56%;
    transform: translate(-50%, -50%);
    border-radius: 32% / 40%;
    background: var(--visor-bg, radial-gradient(circle at 50% 26%, #2b3c60, #111c34 55%, #070d1e));
    box-shadow:
      inset 0 2px 6px rgba(140,175,235,.34),
      inset 0 -4px 8px #000,
      0 0 0 2px var(--visor-ring, rgba(150,175,215,.28));
    overflow: hidden;
    z-index: 4;
  }
  .visor::before {
    content: ''; position: absolute; left: 8%; top: 6%; width: 84%; height: 34%;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(170,200,245,.30), transparent);
  }

  .eyes { position: absolute; inset: 0; }
  .eye {
    position: absolute; top: 30%; width: 16%; height: 32%; border-radius: 50%;
    background: radial-gradient(circle at 40% 32%, #ffffff, var(--eye,#9fd6ff) 70%);
    box-shadow: 0 0 5px var(--eye,#6fcaff), 0 0 13px var(--eye,#4aa8ff), inset 0 0 2px #fff;
    animation: blink 4.6s infinite; transform-origin: center;
  }
  .eye.l { left: 24%; } .eye.r { right: 24%; }
  @keyframes blink { 0%,93%,100% { transform: scaleY(1);} 96.5% { transform: scaleY(.1);} }

  .smile {
    position: absolute; left: 50%; top: 60%; width: 26%; height: 18%;
    transform: translateX(-50%);
    border: 2.4px solid transparent; border-bottom-color: var(--eye,#bfe6ff);
    border-radius: 50%;
    box-shadow: 0 2px 6px var(--glow);
  }

  /* monocle (Analyst) */
  .monocle {
    position: absolute; top: 26%; right: 17%; width: 26%; height: 40%;
    border: 2px solid var(--accent); border-radius: 50%;
    box-shadow: 0 0 6px var(--accent), inset 0 0 6px rgba(255,210,120,.4);
  }
  .monocle::after {
    content: ''; position: absolute; right: 46%; top: 100%;
    width: 1.5px; height: 14px; background: var(--accent); transform: rotate(8deg);
  }

  /* neck */
  .neck {
    position: relative; width: 18%; height: var(--neck-h, 13px);
    margin: -3px auto -2px;
    border-radius: 2px;
    background: repeating-linear-gradient(180deg, #eef1f6 0, #eef1f6 1px, #b9c2d0 1.6px, #8a94a6 3px);
    box-shadow: inset 0 0 2px rgba(0,0,0,.35), 0 2px 3px rgba(0,0,0,.3);
    z-index: 2;
  }

  /* torso */
  .torso {
    position: relative; width: var(--torso-w, 62%); margin: 0 auto;
    aspect-ratio: var(--torso-ar, .82);
    border-radius: 50% 50% 50% 50% / 62% 62% 42% 42%;
    background: radial-gradient(circle at 40% 22%, var(--b1,#ffffff), var(--b2,#eef2f8) 50%, var(--b3,#c6cfde));
    box-shadow:
      inset -8px -10px 16px rgba(120,135,165,.5),
      inset 7px 7px 13px rgba(255,255,255,.92),
      0 11px 22px rgba(0,0,0,.42);
    z-index: 1;
  }

  .chest {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -48%);
    color: var(--chest, #aab8cf);
    font-family: 'DM Mono', monospace; font-weight: 500;
    text-shadow: 0 1.4px 0 rgba(255,255,255,.8), 0 -1px 1px rgba(70,90,120,.4);
  }
  .chest.num { font-size: 30px; letter-spacing: .04em; }
  .chest.code { font-size: 22px; letter-spacing: -.02em; }
  .chest svg { display: block; filter: drop-shadow(0 1px 0 rgba(255,255,255,.7)); }

  /* paint splatter (Creative) */
  .splat { position: absolute; border-radius: 50%; filter: blur(.3px); }

  /* arms */
  .arm {
    position: absolute; width: 22%; height: 42%;
    border-radius: 54% 54% 50% 50% / 68% 68% 32% 32%;
    background: radial-gradient(circle at 42% 28%, var(--b1,#ffffff), #dfe5ef 58%, var(--b3,#a6b2c6));
    box-shadow: 0 4px 9px rgba(0,0,0,.36), inset 2px 2px 4px rgba(255,255,255,.85), inset -2px -3px 5px rgba(120,135,165,.5);
    z-index: 0;
  }

  /* default arm poses (overridden per character) */
  .arm.l { left: -22%; top: 6%; transform: rotate(-30deg); transform-origin: 80% 6%; }
  .arm.r { right: -21%; top: 30%; transform: rotate(26deg); transform-origin: 20% 8%; }

  /* gentle left-arm wave (applied to most) */
  .wave .arm.l { animation: wave 2.6s ease-in-out infinite; animation-delay: var(--bob-delay, 0s); }
  @keyframes wave { 0%,100% { transform: rotate(-30deg);} 50% { transform: rotate(-46deg);} }

  /* pose: salute (Commander) */
  .salute .arm.l { left: -8%; top: -10%; transform: rotate(-64deg); transform-origin: 80% 90%; }
  .salute .arm.l { animation: saluteWave 2.8s ease-in-out infinite; animation-delay: var(--bob-delay,0s); }
  @keyframes saluteWave { 0%,100% { transform: rotate(-64deg);} 50% { transform: rotate(-78deg);} }

  /* pose: typing (Hacker) — both arms forward/low */
  .typing .arm.l { left: -12%; top: 40%; transform: rotate(28deg); }
  .typing .arm.r { right: -12%; top: 40%; transform: rotate(-28deg); }
  .typing .arm.l { animation: typeL 1.1s ease-in-out infinite; }
  .typing .arm.r { animation: typeR 1.1s ease-in-out infinite .2s; }
  @keyframes typeL { 0%,100% { transform: rotate(28deg) translateY(0);} 50% { transform: rotate(28deg) translateY(3px);} }
  @keyframes typeR { 0%,100% { transform: rotate(-28deg) translateY(0);} 50% { transform: rotate(-28deg) translateY(3px);} }

  /* pose: point (Creative) — left up pointing, right on hip */
  .point .arm.l { left: -10%; top: -14%; transform: rotate(-58deg); }
  .point .arm.l { animation: pointWave 2.4s ease-in-out infinite; }
  @keyframes pointWave { 0%,100% { transform: rotate(-58deg);} 50% { transform: rotate(-72deg);} }
  .point .arm.r { right: -8%; top: 38%; width: 19%; height: 34%; transform: rotate(58deg); }

  /* pose: crossed (Guardian) */
  .crossed .arm.l { left: 6%; top: 30%; width: 50%; height: 22%; transform: rotate(16deg); transform-origin: center; z-index: 3; }
  .crossed .arm.r { right: 6%; top: 38%; width: 50%; height: 22%; transform: rotate(-14deg); transform-origin: center; z-index: 2; }
  .crossed .arm.l { animation: crossBreathe 4s ease-in-out infinite; }
  @keyframes crossBreathe { 0%,100% { transform: rotate(16deg);} 50% { transform: rotate(13deg);} }

  /* pose: present (Analyst) — left waving, right holding hologram */
  .present .arm.r { right: -16%; top: 22%; transform: rotate(40deg); }

  /* hologram chart (Analyst) */
  .holo {
    position: absolute; right: -42%; top: 6%; width: 50px; height: 44px;
    border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,210,120,.16), rgba(255,210,120,.05));
    border: 1px solid rgba(255,210,120,.5);
    box-shadow: 0 0 14px rgba(255,200,110,.5);
    backdrop-filter: blur(1px);
    animation: holoFloat 3.2s ease-in-out infinite;
    z-index: 5;
  }
  @keyframes holoFloat { 0%,100% { transform: translateY(0); opacity:.9;} 50% { transform: translateY(-5px); opacity:1;} }
  .holo svg { width: 100%; height: 100%; }

  /* labels */
  .name { margin-top: 14px; font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
  .role {
    margin-top: 4px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--accent);
  }
  .tag { margin-top: 8px; font-size: 12.5px; color: #8497bd; text-align: center; line-height: 1.4; max-width: 180px; }

  /* ═══════════════ Extended roster (F–P) ═══════════════ */

  /* row divider */
  .divider { max-width: 1240px; margin: 84px auto 44px; text-align: center; }
  .divider .line { height: 1px; background: linear-gradient(90deg, transparent, rgba(140,170,230,.28), transparent); margin-bottom: 18px; }
  .divider .kicker { margin: 0; }

  /* ── face variants ── */
  .surprised .eye { width: 21%; height: 40%; top: 24%; }
  .surprised .omouth { position:absolute; left:50%; top:64%; width:11%; height:14%; transform:translateX(-50%);
    border:2px solid var(--eye); border-radius:50%; box-shadow:0 0 5px var(--glow); }
  .narrow .eye { height: 11%; top: 42%; border-radius: 40%; transform: skewX(-6deg); }
  .serene .eye { height: 12%; top: 44%; border-radius: 50% 50% 50% 50% / 90% 90% 10% 10%; }

  /* clock face (Time Keeper) */
  .clock { width: 66%; height: 88%; color: var(--accent); }
  .clock .hr  { transform-origin: 20px 20px; animation: spin 8s linear infinite; }
  .clock .min { transform-origin: 20px 20px; animation: spin 2.6s linear infinite; }

  /* galaxy (Stargazer) */
  .galaxy { width: 86%; height: 92%; }
  .galaxy .rot { transform-origin: center; animation: spin 14s linear infinite; }

  /* sun face (Solar) */
  .sunface { width: 62%; height: 80%; color: var(--accent); }
  .sunface .rays { transform-origin: center; animation: spin 16s linear infinite; }

  /* error face (Glitch) */
  .err { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-family:'DM Mono',monospace; font-weight:500; font-size:26px; color:#ff3b6b;
    text-shadow: -2px 0 #28e0ff, 2px 0 #6dff5d; animation: errFlick .9s steps(1) infinite; }
  @keyframes errFlick { 0%,72%,100%{opacity:1} 76%{opacity:.2} 82%{opacity:1} 88%{opacity:.4} }

  /* single slit eye (Phantom) */
  .slit { position:absolute; left:50%; top:48%; width:54%; height:8%; transform:translate(-50%,-50%);
    border-radius:6px; background: linear-gradient(90deg, transparent, var(--eye), transparent);
    box-shadow:0 0 8px var(--eye), 0 0 16px var(--accent); animation: slitPulse 3s ease-in-out infinite; }
  @keyframes slitPulse { 0%,100%{opacity:.7;width:48%} 50%{opacity:1;width:58%} }

  /* quantum dots (Quantum) */
  .qdots { position:absolute; inset:0; }
  .qd { position:absolute; width:7%; height:10%; border-radius:50%;
    background: radial-gradient(circle, #fff, var(--eye) 70%); box-shadow:0 0 6px var(--eye);
    animation: qFlick 1.6s ease-in-out infinite; }
  @keyframes qFlick { 0%,100%{opacity:.25; transform:scale(.7)} 50%{opacity:1; transform:scale(1)} }

  /* ── toppers ── */
  .wizhat { position:absolute; left:50%; top:-56%; transform:translateX(-50%); width:64%; height:64%; z-index:5; }
  .wizhat .cone { position:absolute; left:50%; bottom:16%; transform:translateX(-50%); width:74%; height:92%;
    background:linear-gradient(135deg,#7a42c8,#3a1f6a); clip-path:polygon(50% 0,100% 100%,0 100%);
    box-shadow:0 3px 6px rgba(0,0,0,.4); }
  .wizhat .band { position:absolute; left:50%; bottom:22%; transform:translateX(-50%) skewX(-2deg); width:78%; height:11%;
    background:linear-gradient(var(--accent),#d99b2a); border-radius:2px; }
  .wizhat .brim { position:absolute; left:50%; bottom:6%; transform:translateX(-50%); width:104%; height:24%;
    background:radial-gradient(circle at 50% 30%,#5a2f9a,#2e1656); border-radius:50%; }
  .wizhat .tip { position:absolute; left:50%; top:-10%; transform:translateX(-50%); color:var(--accent); }

  .ruler { position:absolute; left:50%; top:-40%; transform:translateX(-50%) rotate(-10deg); width:56%; height:42%; color:var(--accent); z-index:5; }

  .dish { position:absolute; left:50%; top:-34%; transform:translateX(-50%); width:46%; z-index:5; }
  .dish .rod { width:2.5px; height:13px; margin:0 auto; background:linear-gradient(#cfd6e2,#8a94a6); }
  .dish .plate { width:30px; height:18px; margin:-1px auto 0; border-radius:50%;
    background:linear-gradient(150deg,#eaf0fb,#9aa6ba); border:1px solid #7e8aa0; transform:rotate(-22deg);
    box-shadow:inset 0 0 5px rgba(0,0,0,.35); }
  .dish .feed { position:absolute; left:60%; top:18%; width:4px; height:4px; border-radius:50%; background:var(--accent); box-shadow:0 0 5px var(--accent); }

  /* sun-ray halo (Solar) */
  .sunrays { position:absolute; left:50%; top:50%; width:230%; aspect-ratio:1; transform:translate(-50%,-50%);
    background: repeating-conic-gradient(from 0deg, var(--accent) 0deg 3deg, transparent 3deg 13deg);
    border-radius:50%; opacity:.55; animation: spin 22s linear infinite; z-index:-1;
    -webkit-mask: radial-gradient(circle, transparent 38%, #000 41%, #000 56%, transparent 60%);
            mask: radial-gradient(circle, transparent 38%, #000 41%, #000 56%, transparent 60%); }

  /* cloak (Phantom) */
  .cloak { position:absolute; left:50%; top:50%; width:158%; height:78%; transform:translateX(-50%);
    background:linear-gradient(180deg,#1c1136 0%,#0c0620 75%); border-radius:46% 46% 42% 42% / 26% 26% 74% 74%;
    filter:blur(1px); box-shadow:0 0 26px var(--accent); z-index:-1;
    animation: cloakSway 5s ease-in-out infinite; }
  @keyframes cloakSway { 0%,100%{transform:translateX(-50%) rotate(-1.5deg)} 50%{transform:translateX(-50%) rotate(1.5deg)} }

  /* ── wrappers ── */
  .lean { transform: rotate(9deg); }
  .slowrot { animation: spin 26s linear infinite; }
  .ghostwrap { animation: ghostFlick 4.5s ease-in-out infinite; }
  @keyframes ghostFlick { 0%,100%{opacity:1} 28%{opacity:.55} 33%{opacity:.85} 60%{opacity:.5} 66%{opacity:.9} }
  .hue { animation: hueCycle 5s linear infinite; }
  @keyframes hueCycle { to { filter: hue-rotate(360deg); } }

  /* ghost translucency (Ghost) */
  .ghostbody .head, .ghostbody .torso, .ghostbody .arm, .ghostbody .neck { opacity: .58; }

  /* phantom dark joints (Phantom) */
  .phantom .neck { background: linear-gradient(180deg, var(--accent), #1a0e30); box-shadow: 0 0 10px var(--accent); }

  /* duplicate echo (Quantum) */
  .dupwrap { position:absolute; left:50%; top:50%; transform:translate(-46%,-50%); opacity:.32; filter:blur(1.5px) hue-rotate(120deg); z-index:-1; }
  .scene.has-dup .bot { position: relative; }

  /* holo cube (Architect) */
  .holo.cube { background:linear-gradient(180deg, rgba(95,168,255,.16), rgba(95,168,255,.05)); border-color:rgba(95,168,255,.55); box-shadow:0 0 14px rgba(95,168,255,.5); }

  /* torso skin overlays */
  .torso-skin { position:absolute; inset:0; border-radius:inherit; overflow:hidden; z-index:0; }
  .torso-skin .st { position:absolute; border-radius:50%; background:#fff; box-shadow:0 0 3px #cfe4ff; }
  .grid-fx { position:absolute; inset:0;
    background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90deg, var(--accent) 1px, transparent 1px);
    background-size: 12px 12px; opacity:.22; }
  .script-fx { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'DM Mono',monospace; font-size:30px; color:var(--accent); opacity:.16; letter-spacing:2px; }
  .glitch-fx { position:absolute; left:0; right:0; height:18%;
    background:linear-gradient(180deg, rgba(40,224,255,.35), rgba(255,59,107,.35));
    mix-blend-mode:screen; animation: scan 2.2s linear infinite; }
  @keyframes scan { 0%{top:-20%} 100%{top:120%} }
  .glitchT { animation: bob 3.6s ease-in-out infinite, glitchJump 3.4s steps(1) infinite; }
  @keyframes glitchJump { 0%,90%,100%{transform:translate(0,4px)} 92%{transform:translate(-3px,4px); filter:drop-shadow(2px 0 #ff3b6b) drop-shadow(-2px 0 #28e0ff)} 94%{transform:translate(3px,4px)} 96%{transform:translate(-2px,4px)} }
  .wire-fx { position:absolute; inset:0;
    background-image: linear-gradient(135deg, transparent 48%, var(--accent) 49%, var(--accent) 51%, transparent 52%),
                      linear-gradient(45deg, transparent 48%, var(--accent) 49%, var(--accent) 51%, transparent 52%);
    opacity:.3; }

  /* hand orbs (Alchemist) */
  .orb { position:absolute; width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle,#fff,var(--accent)); box-shadow:0 0 6px var(--accent);
    animation: orbFloat 3s ease-in-out infinite; }

  /* shoulder smoke (Alchemist) */
  .smoke { position:absolute; bottom:62%; width:14px; height:30px; border-radius:50%;
    background:radial-gradient(circle, var(--accent), transparent 70%); filter:blur(3px); opacity:.5;
    animation: smokeRise 4s ease-in-out infinite; }
  @keyframes smokeRise { 0%{transform:translateY(0) scale(.7); opacity:0} 30%{opacity:.5} 100%{transform:translateY(-28px) scale(1.3); opacity:0} }

  /* ── scene fx particles ── */
  .fx { position:absolute; inset:0; pointer-events:none; z-index:1; }
  .fx .hg { position:absolute; color:var(--accent); animation: floaty 5s ease-in-out infinite; opacity:.8; }
  .fx .lotus { position:absolute; color:var(--accent); animation: floaty 6s ease-in-out infinite; opacity:.75; }
  .orbit { position:absolute; left:50%; top:46%; width:160%; aspect-ratio:1; transform:translate(-50%,-50%); animation: spin 18s linear infinite; }
  .orbit .ostar { position:absolute; width:4px; height:4px; border-radius:50%; background:#fff; box-shadow:0 0 5px #bcd6ff; }
  .pixels .px { position:absolute; width:5px; height:5px; animation: pxScatter 1.8s ease-in-out infinite; }
  @keyframes pxScatter { 0%{opacity:0; transform:translate(0,0)} 30%{opacity:1} 100%{opacity:0; transform:translate(var(--dx), var(--dy))} }
  .speed { position:absolute; right:54%; top:34%; }
  .speed i { display:block; height:3px; border-radius:3px; margin:6px 0; background:linear-gradient(90deg, transparent, var(--accent)); animation: speedDash 1s linear infinite; }
  @keyframes speedDash { 0%{opacity:.2; transform:translateX(6px)} 50%{opacity:.9} 100%{opacity:.2; transform:translateX(-6px)} }
  .heat { position:absolute; left:50%; top:48%; width:78%; height:74%; transform:translate(-50%,-50%);
    background: radial-gradient(circle, rgba(255,140,60,.20), transparent 70%); filter:blur(3px);
    animation: heat 2.4s ease-in-out infinite; z-index:-1; }
  @keyframes heat { 0%,100%{transform:translate(-50%,-50%) scale(1); opacity:.6} 50%{transform:translate(-50%,-51%) scale(1.05); opacity:.95} }
  .wisp { position:absolute; left:50%; bottom:18%; width:10px; height:26px; border-radius:50%;
    background:radial-gradient(circle, var(--accent), transparent 70%); filter:blur(2px); opacity:.5;
    animation: wispRise 3.4s ease-in-out infinite; }
  @keyframes wispRise { 0%{transform:translate(-50%,0) scale(.7); opacity:0} 35%{opacity:.55} 100%{transform:translate(-50%,-30px) scale(1.2); opacity:0} }

  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0); opacity:.6} 50%{transform:translate(4px,-5px); opacity:1} }
  @keyframes reachWave { 0%,100%{transform:rotate(-84deg)} 50%{transform:rotate(-94deg)} }

  /* pose: reach up (Time Keeper) */
  .reach .arm.l { left:-4%; top:-22%; transform:rotate(-84deg); transform-origin:80% 90%; animation: reachWave 3s ease-in-out infinite; }
  .reach .arm.r { right:-18%; top:36%; transform:rotate(24deg); }
  /* pose: wide open (Solar) */
  .wide .arm.l { left:-28%; top:4%; transform:rotate(-46deg); }
  .wide .arm.r { right:-28%; top:4%; transform:rotate(46deg); }
  .wide .arm.l { animation: wideWaveL 2.8s ease-in-out infinite; }
  @keyframes wideWaveL { 0%,100%{transform:rotate(-46deg)} 50%{transform:rotate(-58deg)} }
  /* pose: meditate palms-up (Sage) */
  .meditate .arm.l { left:-20%; top:44%; transform:rotate(38deg); }
  .meditate .arm.r { right:-20%; top:44%; transform:rotate(-38deg); }
  .meditate .arm.l { animation: medBreath 5s ease-in-out infinite; }
  @keyframes medBreath { 0%,100%{transform:rotate(38deg) translateY(0)} 50%{transform:rotate(34deg) translateY(-2px)} }
  /* pose: sprint, one arm back (Speedster) */
  .sprint .arm.l { left:18%; top:20%; transform:rotate(78deg); transform-origin:30% 20%; }
  .sprint .arm.r { right:-6%; top:34%; transform:rotate(-44deg); }

  /* ═══════════ Row 1 — interactive (Vega · Byte · Iris · Atlas · Lumen) ═══════════ */
  .char[data-key="cmd"], .char[data-key="hack"], .char[data-key="creative"],
  .char[data-key="guard"], .char[data-key="analyst"] { cursor: pointer; }
  .char[data-key="cmd"] .arm, .char[data-key="guard"] .arm {
    transition: transform .24s cubic-bezier(.3,0,.2,1), top .24s ease, left .24s ease, right .24s ease, width .24s ease, height .24s ease; }

  /* resting arm states (no idle loop) */
  .char[data-key="cmd"] .arm.l { left:-20%; top:12%; transform:rotate(-16deg); transform-origin:80% 8%; animation: vegaTapThigh 1.3s ease-in-out infinite; }
  .char[data-key="cmd"] .arm.r { right:-20%; top:12%; transform:rotate(16deg); transform-origin:20% 8%; animation: vegaPoint 6s ease-in-out infinite; }
  .char[data-key="hack"] .arm.l { left:0%; top:48%; transform:rotate(8deg); transform-origin:60% 6%; animation: kbTapSlowL 2s ease-in-out infinite; }
  .char[data-key="hack"] .arm.r { right:0%; top:48%; transform:rotate(-8deg); transform-origin:40% 6%; animation: kbTapSlowR 2s ease-in-out infinite; }
  .char[data-key="creative"] .arm.l { left:-6%; top:-4%; transform:rotate(-56deg); transform-origin:82% 90%; animation: irisChinTap 5s ease-in-out infinite; }
  .char[data-key="creative"] .arm.r { right:-8%; top:34%; width:19%; height:34%; transform:rotate(54deg); transform-origin:22% 18%; animation: irisBrush 4s ease-in-out infinite; }
  .char[data-key="guard"] .arm.l { left:6%; top:30%; width:50%; height:22%; transform:rotate(16deg); transform-origin:center; animation:none; z-index:3; }
  .char[data-key="guard"] .arm.r { right:6%; top:38%; width:50%; height:22%; transform:rotate(-14deg); transform-origin:center; animation:none; z-index:2; }
  .char[data-key="analyst"] .arm.l { left:-13%; top:42%; transform:rotate(26deg); transform-origin:55% 16%; animation:none; }
  .char[data-key="analyst"] .arm.r { right:-16%; top:22%; transform:rotate(40deg); transform-origin:30% 16%; animation: lumenPointSlow 5s ease-in-out infinite; }

  /* ── Vega — Commander ── */
  /* default: steady eye pulse, glowing 01, morse antenna, slow point + thigh tap */
  @keyframes vegaPoint {
    0%,10%   { transform: rotate(16deg); }
    24%,57%  { transform: translate(-20%,5%) rotate(2deg) scale(1.14); }
    72%,100%{ transform: rotate(16deg); }
  }
  @keyframes vegaTapThigh { 0%,100% { transform: rotate(-16deg) translateY(0); } 50% { transform: rotate(-16deg) translateY(4px); } }
  .char[data-key="cmd"] .eye { animation: vegaEyePulse 2.4s ease-in-out infinite; }
  @keyframes vegaEyePulse { 0%,100% { box-shadow:0 0 5px var(--eye),0 0 12px var(--accent),inset 0 0 2px #fff; } 50% { box-shadow:0 0 9px var(--eye),0 0 20px var(--accent),inset 0 0 3px #fff; } }
  .char[data-key="cmd"] .chest.num { color:#dbe6ff; text-shadow:0 0 6px var(--accent); }
  .char[data-key="cmd"] .antenna .ball { animation: vegaMorse 3s steps(1) infinite; }
  @keyframes vegaMorse {
    0%,22%   { opacity:1; box-shadow:0 0 11px var(--accent),0 0 18px var(--accent); }
    25%,33%  { opacity:.2; box-shadow:0 0 3px var(--accent); }
    36%,42%  { opacity:1; box-shadow:0 0 10px var(--accent); }
    45%,52%  { opacity:.2; box-shadow:0 0 3px var(--accent); }
    55%,61%  { opacity:1; box-shadow:0 0 10px var(--accent); }
    64%,100% { opacity:.2; box-shadow:0 0 3px var(--accent); }
  }
  /* hover: full command mode */
  .char[data-key="cmd"]:hover .bot { animation: vegaThrob 1.6s ease-in-out infinite; }
  @keyframes vegaThrob { 0%,100% { transform: translateY(2px) scale(1); } 50% { transform: translateY(-3px) scale(1.02); } }
  .char[data-key="cmd"]:hover .arm.r { animation: vegaPointHold 1.6s ease-in-out infinite; }
  @keyframes vegaPointHold { 0%,100% { transform: translate(-20%,5%) rotate(2deg) scale(1.14); } 50% { transform: translate(-25%,5%) rotate(0deg) scale(1.17); } }
  .char[data-key="cmd"]:hover .arm.l { animation: vegaDirect 1.4s ease-in-out infinite; }
  @keyframes vegaDirect { 0%,100% { transform: rotate(-54deg); } 50% { transform: rotate(-70deg); } }
  .char[data-key="cmd"]:hover .eye { animation:none; box-shadow:0 0 10px var(--eye),0 0 26px var(--accent),0 0 42px var(--accent),inset 0 0 4px #fff; filter:brightness(1.5); transform: scaleY(.5) translateY(3px); }
  /* stern command face — brows, determined mouth, set-jaw shadow (hover only) */
  .vega-stern { position:absolute; inset:0; z-index:5; opacity:0; transition:opacity .22s ease; pointer-events:none; }
  .char[data-key="cmd"]:hover .vega-stern { opacity:1; }
  .vega-stern .brow { position:absolute; top:19%; width:23%; height:3px; border-radius:2px;
    background: linear-gradient(90deg, rgba(170,200,250,.95), rgba(90,130,190,.55));
    box-shadow: 0 0 5px rgba(120,170,255,.6), 0 2px 2px rgba(0,0,0,.5); }
  .vega-stern .bl { left:16%; transform: rotate(16deg); transform-origin:right; }
  .vega-stern .br { right:16%; transform: rotate(-16deg); transform-origin:left; }
  .vega-stern .mouth { position:absolute; left:50%; top:66%; width:28%; height:10%; transform:translateX(-50%);
    border-top:3px solid rgba(200,222,255,.85); border-radius:60% 60% 0 0 / 100% 100% 0 0;
    box-shadow: 0 -1px 4px rgba(120,170,255,.5); }
  .char[data-key="cmd"]:hover .smile { opacity:0; }
  .char[data-key="cmd"] .head { position:relative; }
  .char[data-key="cmd"] .head::after { content:''; position:absolute; left:16%; bottom:5%; width:68%; height:28%;
    border-radius:50%; background: radial-gradient(ellipse at 50% 100%, rgba(8,16,34,.5), transparent 70%);
    opacity:0; transition:opacity .22s ease; z-index:3; pointer-events:none; }
  .char[data-key="cmd"]:hover .head::after { opacity:1; }
  .char[data-key="cmd"]:hover .chest.num { color:#fff; text-shadow:0 0 12px var(--accent),0 0 4px #fff; }
  .char[data-key="cmd"]:hover .antenna .ball { animation: cmdFlash .25s steps(1) infinite; }
  @keyframes cmdFlash { 0%,100% { opacity:1; box-shadow:0 0 12px var(--accent), 0 0 22px var(--accent); } 50% { opacity:.3; box-shadow:0 0 4px var(--accent); } }
  /* targeting reticle (hover) */
  .reticle { position:absolute; left:50%; top:54%; width:40px; height:40px; margin:-20px 0 0 -20px; opacity:0; transition:opacity .3s; z-index:7; pointer-events:none; color:var(--accent); }
  .reticle svg { width:100%; height:100%; display:block; }
  .char[data-key="cmd"]:hover .reticle { opacity:.9; animation: reticleScan 4.5s ease-in-out infinite; }
  @keyframes reticleScan { 0% { transform: translate(-32px,-6px); } 50% { transform: translate(30px,14px); } 100% { transform: translate(-32px,-6px); } }
  .cmd-standby { position:absolute; left:50%; bottom:2%; transform:translateX(-50%); white-space:nowrap; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.13em; color:var(--accent); text-shadow:0 0 8px var(--accent); z-index:7; pointer-events:none; }
  .char[data-key="cmd"] .arm.r.fire { transform: translate(-26%,-2%) rotate(2deg) scale(1.22); transition: transform .16s cubic-bezier(.2,1.5,.4,1); z-index:5; }
  .cmd-order { position:absolute; left:50%; bottom:2%; transform:translateX(-50%); white-space:nowrap;
    font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent); text-shadow:0 0 8px var(--accent); z-index:7; }

  /* ── Byte — Hacker (stays perfectly upright) ── */
  .char[data-key="hack"]:hover .eye { animation: hackEye .14s steps(1) infinite; }
  @keyframes hackEye { 0%,100% { filter: brightness(1); } 50% { filter: brightness(2.4); } }
  /* head nods forward (down) on hover — 3D, no sideways turn */
  .char[data-key="hack"] .head { transition: transform .3s ease; transform-origin: 50% 82%; }
  .char[data-key="hack"]:hover .head { transform: perspective(320px) rotateX(14deg); }
  .char[data-key="hack"] .visor { transition: transform .3s ease; }
  .char[data-key="hack"]:hover .visor { transform: translate(-50%,-50%) translateY(5px); }
  .char[data-key="hack"] .head::before { content:''; position:absolute; left:33%; top:12%; width:34%; height:22%; z-index:4; pointer-events:none; border-radius:50%; background: radial-gradient(circle, rgba(255,255,255,.8), transparent 70%); filter: blur(1px); opacity:0; transition: transform .3s ease, opacity .3s ease; }
  .char[data-key="hack"]:hover .head::before { transform: translateY(-4px); opacity:.85; }
  .char[data-key="hack"] .head::after { content:''; position:absolute; inset:0; border-radius:inherit; z-index:5; pointer-events:none; opacity:0; transition:opacity .3s ease; background: linear-gradient(180deg, transparent 46%, rgba(6,18,10,.5) 100%); }
  .char[data-key="hack"]:hover .head::after { opacity:1; }
  .char[data-key="hack"]:hover .arm.l { animation: byteTapL .16s ease-in-out infinite; }
  .char[data-key="hack"]:hover .arm.r { animation: byteTapR .16s ease-in-out infinite; }
  @keyframes byteTapL { 0%,100% { transform: rotate(8deg) translateY(0); } 50% { transform: rotate(8deg) translateY(7px); } }
  @keyframes byteTapR { 0%,100% { transform: rotate(-8deg) translateY(7px); } 50% { transform: rotate(-8deg) translateY(0); } }
  @keyframes kbTapSlowL { 0%,50%,100% { transform: rotate(8deg) translateY(0); } 25% { transform: rotate(8deg) translateY(7px); } }
  @keyframes kbTapSlowR { 0%,50%,100% { transform: rotate(-8deg) translateY(0); } 75% { transform: rotate(-8deg) translateY(7px); } }
  .kbd { position:absolute; left:50%; top:83%; width:80%; transform: translate(-50%,-50%) perspective(190px) rotateX(50deg); z-index:5; pointer-events:none; filter: drop-shadow(0 0 5px rgba(45,255,138,.35)); transition: filter .25s ease; }
  .kbd svg { width:100%; display:block; }
  .kbd svg .key { transition: fill .07s ease; }
  .kbd svg .key.lit { fill:#6dffa6; }
  .char[data-key="hack"]:hover .kbd { filter: drop-shadow(0 0 13px #2bff7a) brightness(1.7); }
  .coderain { position:absolute; inset:0; border-radius:14px; overflow:hidden; opacity:.2; transition:opacity .3s; z-index:0; }
  .char[data-key="hack"]:hover .coderain { opacity:.6; }
  .coderain.full { opacity:1; background:rgba(0,14,5,.9); z-index:6; }
  .coderain .col { position:absolute; top:-110%; font-family:'DM Mono',monospace; font-size:11px; line-height:1.15; color:#3dff8a; text-shadow:0 0 6px #2bff7a; white-space:pre; animation: rain linear infinite; }
  .coderain .col.extra { display:none; }
  .char[data-key="hack"]:hover .coderain .col { animation-duration: .55s !important; color:#7dffb0; text-shadow:0 0 9px #3dff8a; }
  .char[data-key="hack"]:hover .coderain .col.extra { display:block; }
  @keyframes rain { to { transform: translateY(330%); } }
  .hackframe { position:absolute; inset:0; border:2px solid #3dff8a; border-radius:14px; box-shadow:0 0 14px #2bff7a, inset 0 0 16px rgba(45,255,138,.3); z-index:7; pointer-events:none; animation: frameGlitch .3s steps(2) infinite; }
  @keyframes frameGlitch { 0%,100% { clip-path: inset(0); transform: translateX(0); } 50% { clip-path: inset(3% 0 0 0); transform: translateX(2px); } }
  .access { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); font-family:'DM Mono',monospace; font-size:14px; letter-spacing:.1em; color:#3dff8a; text-shadow:0 0 10px #2bff7a; z-index:8; animation: accessFlash .5s steps(1) infinite; }
  @keyframes accessFlash { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  /* ── Iris — Creative (painting; no spin) ── */
  .char[data-key="creative"] .head { animation: irisStudy 5s ease-in-out infinite; }
  @keyframes irisStudy { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(5deg); } }
  @keyframes irisBrush {
    0%,100% { transform: rotate(54deg); }
    25%     { transform: rotate(20deg) translate(-3px,-4px); }
    50%     { transform: rotate(70deg) translate(2px,2px); }
    72%     { transform: rotate(40deg); }
  }
  @keyframes irisChinTap {
    0%,40%,100% { transform: rotate(-56deg) translateY(0); }
    50%,55%     { transform: rotate(-56deg) translateY(-3px); }
  }
  .char[data-key="creative"] .scene::before { animation: halo 4.4s ease-in-out infinite, irisRainbow 9s linear infinite; }
  @keyframes irisRainbow { to { filter: hue-rotate(360deg); } }
  /* hover: creative frenzy (no spin) */
  .char[data-key="creative"]:hover .head { animation: irisBob .5s ease-in-out infinite; }
  @keyframes irisBob { 0%,100% { transform: rotate(-6deg) translateY(0); } 50% { transform: rotate(6deg) translateY(-3px); } }
  .char[data-key="creative"]:hover .arm.r { animation: irisFrenzyR .45s ease-in-out infinite; }
  @keyframes irisFrenzyR { 0%,100% { transform: rotate(18deg) translate(-2px,-3px); } 50% { transform: rotate(74deg) translate(3px,3px); } }
  .char[data-key="creative"]:hover .arm.l { animation: irisFrenzyL .5s ease-in-out infinite; }
  @keyframes irisFrenzyL { 0%,100% { transform: rotate(-40deg); } 50% { transform: rotate(-74deg) translate(-2px,-3px); } }
  .char[data-key="creative"]:hover .scene::before { animation: halo 4.4s ease-in-out infinite, irisRainbow 2.4s linear infinite; }
  .sparkles, .paintfx { position:absolute; opacity:0; transition:opacity .3s; pointer-events:none; }
  .sparkles { inset:0; z-index:6; }
  .paintfx { left:auto; right:6%; top:40%; width:0; height:0; z-index:7; }
  .char[data-key="creative"]:hover .sparkles, .char[data-key="creative"]:hover .paintfx { opacity:1; }
  .sparkles .sp { position:absolute; color:#fff; animation: spTwinkle 1.2s ease-in-out infinite; }
  @keyframes spTwinkle { 0%,100% { opacity:0; transform:scale(.4); } 50% { opacity:1; transform:scale(1); } }
  .paintfx .pd { position:absolute; left:0; top:0; border-radius:50%; transform-origin:center; animation: paintOut 1s ease-out infinite; }
  @keyframes paintOut { 0% { transform: rotate(var(--ang)) translateY(0) scale(.3); opacity:0; } 20% { opacity:1; } 100% { transform: rotate(var(--ang)) translateY(58px) scale(1); opacity:0; } }
  /* live painting canvas to Iris's left (default) */
  .easel { position:absolute; left:-7%; top:26%; width:50px; height:60px; z-index:5; pointer-events:none; }
  .easel .frame { position:absolute; inset:0; border:1.5px solid rgba(255,255,255,.45); border-radius:3px; background:rgba(255,255,255,.08); box-shadow:0 0 8px rgba(255,255,255,.15); overflow:hidden; }
  .easel svg { position:absolute; inset:0; width:100%; height:100%; }
  .char[data-key="creative"]:hover .easel { width:66px; height:78px; top:18%; left:-14%; }
  /* card-background color splashes (hover) */
  .cardsplash { position:absolute; inset:0; border-radius:14px; overflow:hidden; z-index:1; opacity:0; transition:opacity .3s; pointer-events:none; }
  .char[data-key="creative"]:hover .cardsplash { opacity:1; }
  .cardsplash .bl { position:absolute; border-radius:50%; filter:blur(3px); opacity:0; animation: splashFade 1.6s ease-in-out infinite; }
  @keyframes splashFade { 0%,100% { opacity:0; transform:scale(.5); } 50% { opacity:.5; transform:scale(1); } }
  .paintcanvas { position:absolute; inset:0; border-radius:14px; overflow:hidden; z-index:7; pointer-events:none; }
  .paintcanvas svg { width:100%; height:100%; }
  @keyframes paintDraw { to { stroke-dashoffset: 0; } }

  /* ── Atlas — Guardian ── */
  .char[data-key="guard"]:hover .bot { animation: guardRise 1.4s ease-in-out infinite; }
  @keyframes guardRise { 0%,100% { transform: translateY(2px) scale(1.1); } 50% { transform: translateY(-4px) scale(1.1); } }
  .char[data-key="guard"]:hover .arm.l { left:-22%; top:2%; width:22%; height:42%; transform: rotate(-42deg); }
  .char[data-key="guard"]:hover .arm.r { right:-22%; top:2%; width:22%; height:42%; transform: rotate(42deg); }
  .laser { position:absolute; top:34%; left:0; width:100%; height:0; opacity:0; transition:opacity .3s; z-index:6; pointer-events:none; }
  .char[data-key="guard"]:hover .laser { opacity:1; }
  .laser i { position:absolute; left:0; top:-2px; width:28%; height:4px; border-radius:3px; background:linear-gradient(90deg, transparent, #ff4a4a, transparent); box-shadow:0 0 10px #ff3b3b; animation: laserSweep 1.8s ease-in-out infinite; }
  @keyframes laserSweep { 0% { transform: translateX(-12%); } 100% { transform: translateX(330%); } }
  .char[data-key="guard"].alert .bot { animation: guardShake .07s steps(2) infinite; }
  @keyframes guardShake { 0%,100% { transform: translate(-2px,0) scale(1.1); } 50% { transform: translate(2px,0) scale(1.1); } }
  .alert-banner { position:absolute; left:0; right:0; top:6%; text-align:center; font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.18em; color:#fff; background:rgba(214,40,40,.9); padding:5px 0; z-index:8; box-shadow:0 0 14px #ff3b3b; animation: accessFlash .4s steps(1) infinite; }
  .pulse-ring { position:absolute; left:50%; top:54%; width:22px; height:22px; transform:translate(-50%,-50%); border:2px solid #ff5a5a; border-radius:50%; z-index:6; pointer-events:none; animation: pulseRing 1.3s ease-out forwards; }
  @keyframes pulseRing { 0% { opacity:.9; transform: translate(-50%,-50%) scale(.3); } 100% { opacity:0; transform: translate(-50%,-50%) scale(4.2); } }
  .secured-msg { position:absolute; left:50%; bottom:2%; transform:translateX(-50%); white-space:nowrap; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.14em; color:#ff8a8a; text-shadow:0 0 8px #ff3b3b; z-index:8; animation: ghostMsg 2s ease forwards; }

  /* ── Lumen — Analyst ── */
  /* head turn — simulated 3D sphere: dome stays circular; face slides + foreshortens,
     a rim shadow sweeps the dome, and the glossy highlight shifts opposite the turn */
  .char[data-key="analyst"] .head { position: relative; }
  .char[data-key="analyst"] .head::after { content:''; position:absolute; inset:0; border-radius:inherit; z-index:3; pointer-events:none;
    background: linear-gradient(90deg, rgba(8,16,34,.6), transparent 58%); transform-origin:center; opacity:.12;
    animation: lumenShadeRead 7s ease-in-out infinite; }
  .char[data-key="analyst"] .head::before { content:''; position:absolute; left:30%; top:13%; width:30%; height:24%; z-index:5; pointer-events:none;
    border-radius:50%; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.85), transparent 70%); filter: blur(1px); opacity:.7;
    animation: lumenHiliteRead 7s ease-in-out infinite; }
  .char[data-key="analyst"] .visor { animation: lumenFaceRead 7s ease-in-out infinite; }
  @keyframes lumenFaceRead {
    0%,12%   { transform: translate(-50%,-50%) translateX(0) scaleX(1); }
    28%,42%  { transform: translate(-50%,-50%) translateX(-8px) scaleX(.8); }
    58%,72%  { transform: translate(-50%,-50%) translateX(8px) scaleX(.8); }
    88%,100% { transform: translate(-50%,-50%) translateX(0) scaleX(1); }
  }
  @keyframes lumenShadeRead {
    0%,12%   { opacity:.12; transform: scaleX(1); }
    30%,40%  { opacity:.6;  transform: scaleX(1); }
    50%      { opacity:.1;  transform: scaleX(1); }
    60%,70%  { opacity:.6;  transform: scaleX(-1); }
    88%,100% { opacity:.12; transform: scaleX(1); }
  }
  @keyframes lumenHiliteRead {
    0%,12%   { transform: translateX(0); opacity:.7; }
    28%,42%  { transform: translateX(9px); opacity:.85; }
    58%,72%  { transform: translateX(-9px); opacity:.5; }

  }
  .char[data-key="analyst"]:hover .visor { animation: lumenFaceScan 1.1s steps(1) infinite; }
  .char[data-key="analyst"]:hover .head::after { animation: lumenShadeScan 1.1s steps(1) infinite; }
  .char[data-key="analyst"]:hover .head::before { animation: lumenHiliteScan 1.1s steps(1) infinite; }
  @keyframes lumenFaceScan {

  }
  @keyframes lumenShadeScan {
    0%   { opacity:.6; transform: scaleX(1); }
    33%  { opacity:.6; transform: scaleX(-1); }
    66%  { opacity:.12; transform: scaleX(1); }
    100% { opacity:.6; transform: scaleX(1); }
  }
  @keyframes lumenHiliteScan {

  /* arms: slow point (default, on .arm.r) → fast both (hover) */
  @keyframes lumenPointSlow { 0%,12% { transform: rotate(40deg); } 32% { transform: rotate(10deg); } 48% { transform: rotate(22deg); } 64% { transform: rotate(2deg); } 82%,100% { transform: rotate(40deg); } }
  .char[data-key="analyst"]:hover .arm.r { animation: lumenGestFast 1.2s ease-in-out infinite; }
  @keyframes lumenGestFast { 0%,100% { transform: rotate(40deg); } 25% { transform: rotate(6deg); } 50% { transform: rotate(24deg); } 75% { transform: rotate(0deg); } }
  .char[data-key="analyst"]:hover .arm.l { animation: lumenGestL 1s ease-in-out infinite; }
  @keyframes lumenGestL { 0%,100% { transform: rotate(26deg) translateY(0); } 50% { transform: rotate(46deg) translateY(-3px); } }
  /* eyes brighten + body lean on hover */
  .char[data-key="analyst"]:hover .eye { box-shadow:0 0 8px var(--eye), 0 0 22px var(--accent), inset 0 0 3px #fff; filter: brightness(1.35); }
  .char[data-key="analyst"]:hover .bot { animation: lumenLean 1.4s ease-in-out infinite; }
  @keyframes lumenLean { 0%,100% { transform: translateY(2px) rotate(5deg); } 50% { transform: translateY(-3px) rotate(5deg); } }
  /* holographic monitors */
  .monitors { position:absolute; inset:0; z-index:6; pointer-events:none; }
  .lmon { position:absolute; border-radius:6px; background:rgba(12,24,44,.82); border:1px solid var(--accent); box-shadow:0 0 12px rgba(150,180,235,.5), inset 0 0 10px rgba(120,160,225,.16); overflow:hidden; }
  .lmon svg { width:100%; height:100%; display:block; }
  .lmon .mon-num { position:absolute; right:5px; top:4px; font-family:'DM Mono',monospace; font-size:10px; color:#fff; text-shadow:0 0 6px var(--accent); }
  .lmon.arc { opacity:0; transform: scale(.3); transform-origin:center; }
  .char[data-key="analyst"]:hover .lmon.arc { animation: monPop .5s cubic-bezier(.2,1.4,.4,1) forwards; }
  @keyframes monPop { 0% { opacity:0; transform:scale(.3); } 60% { opacity:1; transform:scale(1.07); } 100% { opacity:1; transform:scale(1); } }
  .mon-line, .mon-spike { stroke-dasharray:1; stroke-dashoffset:1; }
  .mon-line { animation: monDraw 3s ease-in-out infinite; }

  @keyframes monDraw { 0% { stroke-dashoffset:1; } 68% { stroke-dashoffset:0; } 100% { stroke-dashoffset:0; opacity:.35; } }
  .mon-bar { transform-box:fill-box; transform-origin:bottom; animation: monBar 1.3s ease-in-out infinite; }
  @keyframes monBar { 0%,100% { transform: scaleY(.35); } 50% { transform: scaleY(1); } }
  .mon-pie { transform-box:fill-box; transform-origin:center; animation: spin 3s linear infinite; }
  .dashboard { position:absolute; inset:0; border-radius:14px; overflow:hidden; background:rgba(8,16,30,.94); z-index:9; transform: scale(.2); opacity:0; pointer-events:none; box-shadow: inset 0 0 0 1px rgba(255,206,90,.3); animation: dashOpen 2.6s ease forwards; }
  @keyframes dashOpen { 0% { transform: scale(.2); opacity:0; } 12% { transform: scale(1); opacity:1; } 82% { transform: scale(1); opacity:1; } 100% { transform: scale(.25); opacity:0; } }
  @keyframes lineDraw { to { stroke-dashoffset: 0; } }

  /* ═══════════ Interactive reactions (Zen · Null · Vector · Umbra · Helios) ═══════════ */
  .char[data-key="sage"], .char[data-key="glitch"], .char[data-key="arch"],
  .char[data-key="phantom"], .char[data-key="solar"] { cursor: pointer; }

  /* ── Zen — Sage ── */
  .char[data-key="sage"]:hover .head { animation: zenNod 3s ease-in-out infinite; }
  @keyframes zenNod { 0%,100% { transform: perspective(340px) rotateY(0); } 25% { transform: perspective(340px) rotateY(-24deg); } 75% { transform: perspective(340px) rotateY(24deg); } }
  .char[data-key="sage"]:hover .meditate .arm.l { animation: zenPalmL 3s ease-in-out infinite; }
  .char[data-key="sage"]:hover .meditate .arm.r { animation: zenPalmR 3s ease-in-out infinite; }
  @keyframes zenPalmL { 0%,100% { transform: rotate(38deg) translateY(0); } 50% { transform: rotate(20deg) translateY(-10px); } }
  @keyframes zenPalmR { 0%,100% { transform: rotate(-38deg) translateY(0); } 50% { transform: rotate(-20deg) translateY(-10px); } }
  .char[data-key="sage"]:hover .scene::before { filter: brightness(1.7) saturate(1.25); }

  @keyframes lotusUp { 0% { opacity:0; transform: translate(0,0) scale(.5) rotate(0); } 16% { opacity:.95; } 100% { opacity:0; transform: translate(var(--dx,0), -130px) scale(1.15) rotate(var(--rot,40deg)); } }

  /* ── Null — Glitch ── */
  .char[data-key="glitch"]:hover .glitchT { animation: bob 3.6s ease-in-out infinite, glitchHard .42s steps(1) infinite; }
  @keyframes glitchHard {
    0%,100% { transform: translate(0,4px); filter: none; }

    36% { transform: translate(4px,4px); }
    54% { transform: translate(-3px,2px); filter: drop-shadow(-3px 0 #6dff5d) drop-shadow(3px 0 #ff3b6b); }
    72% { transform: translate(3px,5px); }
  }
  .char[data-key="glitch"]:hover .glitch-fx { animation: scan .55s linear infinite; height:24%; }
  .char[data-key="glitch"]:hover .head { animation: glitchTwitch .26s steps(2) infinite; }
  @keyframes glitchTwitch { 0%,100% { transform: translateX(0); } 50% { transform: translateX(3px); } }
  .char[data-key="glitch"]:hover .err { animation: errFlick .3s steps(1) infinite; }
  .fx-glitch-flash { position:fixed; inset:0; z-index:9999; pointer-events:none; mix-blend-mode:screen;
    background: repeating-linear-gradient(0deg, rgba(255,59,107,.5) 0 2px, transparent 2px 5px, rgba(40,224,255,.5) 5px 7px, transparent 7px 11px);
    animation: glitchFlash .3s steps(3) forwards; }
  @keyframes glitchFlash { 0% { opacity:.9; transform: translateX(-5px); } 50% { opacity:.55; transform: translateX(5px); } 100% { opacity:0; } }
  .reboot-bar { position:absolute; left:50%; top:50%; transform: translate(-50%,8px); width:58%; height:6px; border-radius:3px;
    background: rgba(255,255,255,.22); overflow:hidden; z-index:6; box-shadow:0 0 8px var(--accent); }
  .reboot-bar i { display:block; height:100%; width:0; background: linear-gradient(90deg,#28e0ff,#ff3b6b); animation: reboot .9s ease-out forwards; }
  @keyframes reboot { to { width:100%; } }

  /* ── Vector — Architect ── */
  .char[data-key="arch"]:hover .wire-fx { animation: wireDraw 1.6s ease-in-out infinite; }
  @keyframes wireDraw { 0% { clip-path: inset(0 100% 0 0); opacity:.65; } 55% { clip-path: inset(0 0 0 0); opacity:.65; } 100% { clip-path: inset(0 0 0 0); opacity:.28; } }
  .holo.cube svg { transform-origin:center; animation: cubeSpin 6s linear infinite; }
  @keyframes cubeSpin { to { transform: perspective(150px) rotateY(360deg); } }
  .char[data-key="arch"]:hover .holo.cube svg { animation-duration: 1.3s; }
  .char[data-key="arch"]:hover .present .arm.r { animation: archDraw 1.8s ease-in-out infinite; }
  @keyframes archDraw { 0%,100% { transform: rotate(40deg); } 50% { transform: rotate(-14deg); } }
  /* focused architect expression — hover only, no motion */
  .char[data-key="arch"]:hover .eye { animation:none; height:15%; top:38%; border-radius:26% 26% 34% 34%; }
  .char[data-key="arch"]:hover .eye.l { transform: scaleY(.9) skewX(9deg); }
  .char[data-key="arch"]:hover .eye.r { transform: scaleY(.9) skewX(-9deg); }

  .arch-focus .al { left:17%; top:21%; transform: rotate(-13deg); transform-origin:right; }
  .arch-focus .ar { right:17%; top:14%; transform: rotate(12deg); transform-origin:left; }
  .arch-focus .furrow { position:absolute; top:15%; width:2px; height:8.5%; border-radius:1px; background:rgba(185,215,252,.72); box-shadow:0 0 3px var(--glow); }
  .arch-focus .fl { left:46.5%; transform: rotate(-7deg); }
  .arch-focus .fr { left:52.5%; transform: rotate(7deg); }
  .arch-focus .amouth { position:absolute; left:50%; top:62%; width:20%; height:7%; transform:translateX(-50%);
    border:2.2px solid transparent; border-top-color: var(--eye,#bce0ff); border-radius:50%; box-shadow:0 -1px 4px var(--glow); }
  .airgrid { position:absolute; right:1%; top:28%; width:58px; height:48px; opacity:0; pointer-events:none; z-index:5;
    background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90deg, var(--accent) 1px, transparent 1px);
    background-size: 10px 10px; border:1px solid var(--accent); box-shadow:0 0 12px rgba(95,168,255,.45); }
  .char[data-key="arch"]:hover .airgrid { animation: airgridDraw 1.8s ease-in-out infinite; }
  @keyframes airgridDraw { 0% { opacity:0; clip-path: inset(0 100% 0 0); } 45% { opacity:.9; clip-path: inset(0 0 0 0); } 92% { opacity:.9; } 100% { opacity:0; clip-path: inset(0 0 0 0); } }
  .blueprint-burst { position:absolute; left:50%; top:46%; width:84px; height:84px; transform: translate(-50%,-50%) scale(0);
    color:var(--accent); pointer-events:none; z-index:7; animation: bpBurst 1.3s ease-out forwards; }
  @keyframes bpBurst { 0% { transform: translate(-50%,-50%) scale(0) rotate(-10deg); opacity:0; } 25% { opacity:1; } 55% { transform: translate(-50%,-50%) scale(1.7) rotate(4deg); opacity:1; } 100% { transform: translate(-50%,-50%) scale(.2) rotate(0); opacity:0; } }

  /* ── Umbra — Phantom ── */
  /* default — silent operations */
  .char[data-key="phantom"] .bot { animation: bob 3.6s ease-in-out infinite, phantomCloak 4s ease-in-out infinite; }
  @keyframes phantomCloak { 0%,100%{ opacity:.9 } 50%{ opacity:.7 } }
  .char[data-key="phantom"] .slit { animation: phantomSlit 3.6s ease-in-out infinite; }
  @keyframes phantomSlit { 0%,44%,56%,100%{ opacity:1; box-shadow:0 0 8px var(--eye),0 0 16px var(--accent); } 22%{ opacity:.5; } 49%,51%{ opacity:0; box-shadow:none; } }
  .char[data-key="phantom"] .arm.r { animation: phantomReach 5s ease-in-out infinite; transform-origin:20% 8%; }
  @keyframes phantomReach { 0%,70%,100%{ transform:rotate(26deg) translate(0,0); } 18%{ transform:rotate(52deg) translate(8px,-2px); } 30%{ transform:rotate(54deg) translate(11px,0) scaleX(.9); } 44%{ transform:rotate(52deg) translate(8px,-2px); } }
  .phantom-scan { position:absolute; left:6%; top:48%; width:2px; height:34%; transform:translateY(-50%); z-index:2; pointer-events:none;
    background:linear-gradient(180deg, transparent, var(--accent), transparent); box-shadow:0 0 10px var(--accent), 0 0 20px var(--accent);
    opacity:.7; animation: phantomScan 4.6s ease-in-out infinite; }
  @keyframes phantomScan { 0%{ left:6%; opacity:0 } 12%{ opacity:.7 } 88%{ opacity:.7 } 100%{ left:94%; opacity:0 } }
  .phantom-lock { position:absolute; z-index:3; color:var(--accent); pointer-events:none; filter:drop-shadow(0 0 5px var(--accent)); animation: phantomLock 1s ease-in-out forwards; }
  @keyframes phantomLock { 0%{ opacity:0; transform:scale(.5) } 25%{ opacity:1; transform:scale(1) } 70%{ opacity:1 } 100%{ opacity:0; transform:scale(1.12) } }
  .phantom-aura { position:absolute; left:50%; top:48%; width:78%; height:78%; transform:translate(-50%,-50%) scale(.55); border-radius:50%;
    background:radial-gradient(circle, var(--glow), transparent 70%); opacity:0; z-index:0; pointer-events:none; transition:transform .6s ease, opacity .6s ease; }
  /* hover — revealing the phantom */
  .char[data-key="phantom"].seen .bot { opacity:1 !important; animation: bob 3.6s ease-in-out infinite; filter: drop-shadow(0 0 14px var(--accent)); }
  .char[data-key="phantom"].seen .slit { animation:none; opacity:1; height:11%; box-shadow:0 0 12px var(--eye),0 0 26px var(--accent); }
  .char[data-key="phantom"].seen .arm.l { transform: rotate(-58deg) !important; animation:none !important; transition: transform .6s ease; }
  .char[data-key="phantom"].seen .arm.r { transform: rotate(58deg) !important; animation:none !important; transition: transform .6s ease; }
  .char[data-key="phantom"].seen .head { transform: rotate(-8deg); transition: transform .6s ease; }
  .char[data-key="phantom"].seen .phantom-aura { opacity:.85; transform:translate(-50%,-50%) scale(1.3); }
  .char[data-key="phantom"].seen .phantom-scan { opacity:0; }
  .phantom-badge { position:absolute; z-index:6; pointer-events:none; display:flex; align-items:center; gap:4px;
    padding:3px 7px 3px 5px; border-radius:999px; background:rgba(40,24,70,.92); border:1px solid var(--accent);
    box-shadow:0 0 10px var(--glow); font-family:'DM Mono',monospace; font-size:8px; letter-spacing:.04em; color:#e6d6ff; white-space:nowrap;
    opacity:0; transform:scale(.7); transition: opacity .4s ease, transform .4s cubic-bezier(.3,1.3,.4,1); }
  .phantom-badge.show { opacity:1; transform:scale(1); }
  .phantom-badge .tick { display:inline-flex; align-items:center; justify-content:center; width:11px; height:11px; border-radius:50%; background:var(--accent); color:#1a0e30; font-weight:700; font-size:8px; }
  /* click — vanish to darkness, eye, rematerialize */
  .char[data-key="phantom"].gone .bot { opacity:0 !important; animation:none !important; transition:none; }
  .char[data-key="phantom"].gone .phantom-scan, .char[data-key="phantom"].gone .cloak, .char[data-key="phantom"].gone .phantom-aura { opacity:0 !important; }
  .phantom-dark { position:absolute; inset:0; border-radius:14px; background:#040208; z-index:9; opacity:0; pointer-events:none; transition: opacity .25s ease; }
  .phantom-dark.on { opacity:1; }
  .phantom-eye { position:absolute; left:50%; top:46%; width:34px; height:5px; transform:translate(-50%,-50%); border-radius:4px; z-index:2;
    background:linear-gradient(90deg, transparent, var(--eye), transparent); box-shadow:0 0 10px var(--eye),0 0 22px var(--accent); opacity:0; pointer-events:none; }
  .phantom-eye.lit { opacity:1; transition: opacity .35s ease; }
  .phantom-eye.blink { animation: phantomBlinkOnce .42s ease-in-out; }
  @keyframes phantomBlinkOnce { 0%,100%{ transform:translate(-50%,-50%) scaleY(1) } 50%{ transform:translate(-50%,-50%) scaleY(.12) } }
  .phantom-flash { position:absolute; left:50%; top:46%; width:74px; height:74px; transform:translate(-50%,-50%) scale(0); border-radius:50%;
    background:radial-gradient(circle,#fff,var(--accent) 45%,transparent 72%); opacity:0; z-index:10; pointer-events:none; }
  .phantom-flash.go { animation: phantomFlash .6s ease-out 1; }
  @keyframes phantomFlash { 0%{ opacity:0; transform:translate(-50%,-50%) scale(.2) } 35%{ opacity:1; transform:translate(-50%,-50%) scale(1.2) } 100%{ opacity:0; transform:translate(-50%,-50%) scale(2.2) } }
  .char[data-key="phantom"].materialize .bot { animation: phantomMaterialize .7s ease-out; }
  @keyframes phantomMaterialize { 0%{ opacity:0; filter:brightness(3) drop-shadow(0 0 24px var(--accent)) } 35%{ opacity:1; filter:brightness(2) } 100%{ opacity:1; filter:none } }
  .ghost-msg { position:absolute; left:50%; bottom:4%; transform: translateX(-50%); white-space:nowrap; z-index:7;
    font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.14em; color:var(--accent); text-shadow:0 0 9px var(--accent);
    pointer-events:none; animation: ghostMsg 2.1s ease-in-out forwards; }
  @keyframes ghostMsg { 0% { opacity:0; } 25% { opacity:1; } 70% { opacity:1; } 100% { opacity:0; } }

  /* ── Helios — Solar ── */
  .char[data-key="solar"]:hover .sunrays { animation-duration: 7s; opacity:.85; }
  .char[data-key="solar"]:hover .bot { filter: brightness(1.18) drop-shadow(0 0 16px rgba(255,138,58,.65)); }

  .char[data-key="solar"]:hover .wide .arm.r { animation: solarAbsorbR 2.6s ease-in-out infinite; }
  @keyframes solarAbsorbL { 0%,100% { transform: rotate(-46deg); } 50% { transform: rotate(-74deg) translateY(-8px); } }
  @keyframes solarAbsorbR { 0%,100% { transform: rotate(46deg); } 50% { transform: rotate(74deg) translateY(-8px); } }
  .flare-burst { position:absolute; left:50%; top:42%; width:0; height:0; transform: translate(-50%,-50%); pointer-events:none; z-index:7; }
  .flare-burst i { position:absolute; left:0; top:0; width:4px; height:64px; margin-left:-2px; transform-origin:50% 0; border-radius:3px;
    background: linear-gradient(#ffb066, rgba(255,138,58,0)); animation: flareRay .9s ease-out forwards; }
  @keyframes flareRay { 0% { transform: rotate(var(--ang)) translateY(0) scaleY(.3); opacity:0; } 20% { opacity:1; } 100% { transform: rotate(var(--ang)) translateY(46px) scaleY(1.5); opacity:0; } }
  .fx-solar-bloom { position:fixed; inset:0; z-index:9998; pointer-events:none;
    background: radial-gradient(circle at 50% 50%, transparent 52%, rgba(255,138,58,.5) 100%);
    animation: solarBloom 1s ease-out forwards; }
  @keyframes solarBloom { 0% { opacity:0; } 25% { opacity:1; } 100% { opacity:0; } }

  /* ═══════════ Row 2 — interactive (Tempus · Wisp · Mordin · Cosmo · Dash) ═══════════ */
  .char[data-key="time"], .char[data-key="ghost"], .char[data-key="alch"],
  .char[data-key="star"], .char[data-key="speed"] { cursor: pointer; }
  .char[data-key="alch"] .arm, .char[data-key="star"] .arm { transition: transform .3s ease; }

  /* ── TEMPUS — The Time Keeper ── */
  .char[data-key="time"] .arm.r { animation: tCheckWrist 4s ease-in-out infinite; }
  @keyframes tCheckWrist { 0%,62%,100%{transform:rotate(24deg)} 30%{transform:rotate(-42deg)} }
  .char[data-key="time"].t-fast .clock .hr  { animation-duration: 4.5s; }
  .char[data-key="time"].t-fast .clock .min { animation-duration: 1.5s; }
  .char[data-key="time"].t-fast .clock { filter: drop-shadow(0 0 6px var(--accent)) brightness(1.15); }
  /* Tempus orbit rings (Option C) */
  .tempus-orbits { position:absolute; left:50%; top:60%; width:212px; height:150px; transform:translate(-50%,-50%); pointer-events:none; z-index:0; }
  .t-ring { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); overflow:visible; filter:drop-shadow(0 0 5px rgba(217,138,58,.7)); }
  .t-inner { width:172px; height:86px; }
  .t-outer { width:210px; height:108px; transform:translate(-50%,-50%) rotate(30deg); }
  .t-ring .t-orbit { transform-box:fill-box; transform-origin:center; }
  .t-inner .t-orbit { animation: spin 16s linear infinite; }
  .t-outer .t-orbit { animation: spinRev 12s linear infinite; }
  @keyframes spinRev { to { transform: rotate(-360deg); } }
  .char[data-key="time"].t-fast .t-inner .t-orbit { animation-duration: 9s; }
  .char[data-key="time"].t-fast .t-outer .t-orbit { animation-duration: 7s; }

  /* Tempus meeting-notification bubbles (Option B) */
  .tempus-notes { position:absolute; inset:0; pointer-events:none; z-index:6; overflow:hidden; border-radius:14px; }
  .t-note { position:absolute; bottom:34%; transform:translate(-50%,0); white-space:nowrap;
    font-family:'DM Mono',monospace; font-size:8.5px; letter-spacing:.01em; color:#3a2614;
    background:linear-gradient(180deg,#ffe6c6,#efbe86); border:1px solid rgba(217,138,58,.75);
    border-radius:999px; padding:3px 8px; box-shadow:0 1px 4px rgba(0,0,0,.3), 0 0 8px rgba(217,138,58,.4);
    opacity:0; animation: noteFloat 3.4s ease-out forwards; }
  @keyframes noteFloat { 0%{opacity:0; transform:translate(-50%,6px) scale(.8)} 14%{opacity:1; transform:translate(-50%,0) scale(1)} 78%{opacity:1} 100%{opacity:0; transform:translate(-50%,-118px) scale(.95)} }
  .t-note.done { background:linear-gradient(180deg,#d6f5e0,#8fe6ac); border-color:#46c98a; color:#0a3a22; box-shadow:0 1px 4px rgba(0,0,0,.3), 0 0 11px rgba(70,201,138,.6); }
  .tempus-aura { position:absolute; left:50%; top:54%; width:90%; height:80%; transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; z-index:0; opacity:0; filter:blur(11px); background:radial-gradient(circle,#46c98a,transparent 70%); transition:opacity .5s ease; }
  .char[data-key="time"].t-fast .tempus-aura { opacity:.5; animation: tempusAura 2.4s ease-in-out infinite; }

  function buildChest(c) {
    if (!c.chest) return '';
    const ch = c.chest;
    if (ch.type === 'num')     return '<div class="chest num">'  + ch.text + '</div>';
    if (ch.type === 'code')    return '<div class="chest code">' + ch.text + '</div>';
    if (ch.type === 'shield')  return '<div class="chest">' + SHIELD + '</div>';
    if (ch.type === 'chart')   return '<div class="chest">' + BARS + '</div>';
    if (ch.type === 'flask')   return '<div class="chest">' + FLASK + '</div>';
    if (ch.type === 'bolt')    return '<div class="chest">' + BOLT + '</div>';
    if (ch.type === 'infinity')return '<div class="chest">' + INFINITY + '</div>';
    return '';
  }

      inner += dots;

    const PIECES = [
      () => [ // simple expressive face
        { tag:'circle', attrs:{cx:20,cy:21,r:12}, mode:'fill', color:P.yellow, delay:1.1 },
        { tag:'circle', attrs:{cx:20,cy:21,r:12}, mode:'draw', color:P.pink,   delay:0,  dur:.9 },

        for (let i=0;i<6;i++){ const a=i/6*Math.PI*2; arr.push({ tag:'circle', attrs:{cx:+(cx+Math.cos(a)*r).toFixed(1), cy:+(cy+Math.sin(a)*r).toFixed(1), r:5}, mode:'fill', color:i%2?P.pink:P.purple, delay:.2+i*.13 }); }

    function drawPiece(layers, g, spd) {
      layers.forEach(L => {
        const n = document.createElementNS(NS, L.tag);

        } else {
          n.setAttribute('fill', L.color); n.setAttribute('stroke','none');

          n.style.transition='opacity .4s ease, transform .4s ease';

      pieceIdx = (pieceIdx + count) % PIECES.length;

    const DCOL = ['#5fe0ff', '#9a6bff', '#ff7adf', '#bdfcff', '#7d9bff', '#5fe0ff', '#c08bff'];
    for (let i = 0; i < 7; i++) {
      const orbiter = document.createElement('div'); orbiter.className = 'q-orbiter';
      orbiter.style.setProperty('--tilt', (Math.random() * 180 - 90).toFixed(0) + 'deg');
      orbiter.style.setProperty('--sx', (0.7 + Math.random() * 0.6).toFixed(2));
      orbiter.style.setProperty('--sy', (0.35 + Math.random() * 0.4).toFixed(2));
      const spin = document.createElement('div'); spin.className = 'q-spin';
      spin.style.setProperty('--dur', (1.8 + Math.random() * 4).toFixed(2) + 's');
      spin.style.setProperty('--dir', Math.random() < 0.5 ? 'normal' : 'reverse');
      spin.style.setProperty('--dly', (-Math.random() * 5).toFixed(2) + 's');
      const arm = document.createElement('div'); arm.className = 'q-arm';
      arm.style.setProperty('--r', (52 + Math.random() * 60).toFixed(0) + 'px');
      const dot = document.createElement('div'); dot.className = 'q-dot';
      dot.style.background = 'radial-gradient(circle,#fff,' + DCOL[i] + ' 70%)';
      dot.style.color = DCOL[i];
      arm.appendChild(dot); spin.appendChild(arm); orbiter.appendChild(spin); dots.appendChild(orbiter);
    }
    scene.appendChild(dots);

    /* hover overlays */
    const flash = document.createElement('div'); flash.className = 'q-flash'; scene.appendChild(flash);
    const measure = document.createElement('div'); measure.className = 'q-measure';
    measure.innerHTML = '<div class="hline"></div><div class="vline"></div>' +
      '<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>';
    scene.appendChild(measure);
    const observe = document.createElement('div'); observe.className = 'q-observe'; scene.appendChild(observe);

    let scatterT = null, typeIv = null;
    el.addEventListener('mouseenter', () => {
      el.classList.add('collapsing');
      clearTimeout(scatterT);
      scatterT = setTimeout(() => el.classList.add('scatter'), 500); // freeze 0.5s then scatter
      // type OBSERVING...
      clearInterval(typeIv);
      const txt = 'OBSERVING...'; let i = 0; observe.textContent = '';
      typeIv = setInterval(() => {
        observe.textContent = txt.slice(0, ++i);
        if (i >= txt.length) clearInterval(typeIv);
      }, 75);
    });
    el.addEventListener('mouseleave', () => {
      clearTimeout(scatterT); clearInterval(typeIv);
      el.classList.remove('collapsing', 'scatter');
      observe.textContent = '';
    });

    /* click — multiply then collapse to one */
    const botHTML = mainBot.outerHTML;
    el.addEventListener('click', () => {
      if (el.classList.contains('q-busy')) return;
      el.classList.add('q-busy');
      const clones = [];
      for (let i = 0; i < 6; i++) {
        const c = document.createElement('div'); c.className = 'q-clone';
        c.style.setProperty('--x', (Math.random() * 150 - 75).toFixed(0) + 'px');
        c.style.setProperty('--y', (Math.random() * 120 - 60).toFixed(0) + 'px');
        c.style.opacity = (0.28 + Math.random() * 0.5).toFixed(2);
        c.style.filter = 'hue-rotate(' + (Math.random() * 220 - 110).toFixed(0) + 'deg) blur(.4px)';
        c.innerHTML = botHTML;
        scene.appendChild(c); clones.push(c);
      }
      requestAnimationFrame(() => clones.forEach(c => c.classList.add('out')));
      setTimeout(() => {
        clones.forEach(c => { c.classList.remove('out'); c.classList.add('in'); });
        const ring = document.createElement('div'); ring.className = 'q-shock'; scene.appendChild(ring); setTimeout(() => ring.remove(), 720);
        const msg = document.createElement('div'); msg.className = 'q-restored'; msg.textContent = 'SUPERPOSITION RESTORED'; scene.appendChild(msg);
        msg.style.transition = 'opacity .3s'; requestAnimationFrame(() => msg.style.opacity = '1');
        setTimeout(() => { msg.style.opacity = '0'; setTimeout(() => msg.remove(), 300); }, 1100);
        setTimeout(() => { clones.forEach(c => c.remove()); el.classList.remove('q-busy'); }, 520);
      }, 650);
    });
  })();
  /* Vector — focused architect expression overlay (hover only, CSS-driven) */
  (function () {
    const el = byKey('arch'); if (!el) return;
    const visor = el.querySelector('.visor'); if (!visor) return;
    const f = document.createElement('div'); f.className = 'arch-focus';
    f.innerHTML = '<i class="furrow fl"></i><i class="furrow fr"></i>' +
      '<i class="abrow al"></i><i class="abrow ar"></i>' +
      '<i class="amouth"></i>';
    visor.appendChild(f);
  })();

</script>
</body>
</html>
